<button style="font-size : 20px; width: 100%; height: 100px;" onclick="construct();" >Construct</button>
<p id ="a">STANDARD</p>

<script>
  let a = document.getElementById("a");

  function construct() {
    // check support for API
    if (!('AmbientLightSensor' in window)) {
      a.innerHTML = 'No AmbientLightSensor';
    }

    const sensor = new AmbientLightSensor();
    sensor.addEventListener('reading', (event) => {
      onReadAmbientLight(sensor.illuminance);
    });
    a.innerHTML = 'Constructed';
    console.log('Constructed');
  }

  function onReadAmbientLight(newIllu) {
    console.log(newIllu);
    a.innerHTML = newIllu;
  }

</script>
