<h1>Latitude</h1>
<input id="latitude" type="number" value="0">
<h1>Longitude</h1>
<input id="longitude" type="number" value="0">

Degree : <p id="degree"> degrees </p>

<script>
    let b = document.getElementById("degree");
    let lat = parseInt(document.getElementById("latitude"));
    let lng = parseInt(document.getElementById("longitude"));

    /**
   * Helper method for angle calculation
   * @param {Number} latitude from coordinates of Geolocation
   * @param {Number} longitude from coordinates of Geolocation
   * @return {Number} angle between current position and the North
   */
  function calcDegreeToPoint(latitude, longitude) {
    if (latitude === lat && longitude === lng) {
      return 0;
    }
    // Copied code to calculate the degree
    // But works in a weird way
    // North = 180, East = -90, South = 0, West = 90
    const phiK = (lat * Math.PI) / 180.0;
    const lambdaK = (lng * Math.PI) / 180.0;
    const phi = (latitude * Math.PI) / 180.0;
    const lambda = (longitude * Math.PI) / 180.0;
    const psi =
      (180.0 / Math.PI) *
      Math.atan2(
          Math.sin(lambdaK - lambda),
          Math.cos(phi) * Math.tan(phiK) -
          Math.sin(phi) * Math.cos(lambdaK - lambda));
    // Round to shift out small changes
    let degree = Math.round(psi);
    // By this it becomes
    // North = 360, East = 90, South = 180, West = 270
    degree = degree + 180;
    // Since we work in range [0, 360[
    if (degree === 360) {
      degree = 0;
    }
    return degree;
  }

  /**
   * Gets the location and puts in variables
   *
   * Then calculates the degree and makes sure
   * it is between 0 and 360
   * @param {Geolocation} position
   */
    function locationHandler(position) {
    const {latitude, longitude} = position.coords;
    b.innerHTML = calcDegreeToPoint(latitude, longitude);
  }

  window.navigator.geolocation.getCurrentPosition(locationHandler);
  
</script>
