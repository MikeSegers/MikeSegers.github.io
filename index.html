<button style="font-size : 20px; width: 100%; height: 100px;" onclick="construct();" >Construct</button>
<p id = "a"> </p>

<script>
  let a = document.getElementById("a");

  function construct() {
    const sensor = new AmbientLightSensor();
    sensor.addEventListener('reading', (event) => {
      this.onReadAmbientLight(sensor.illuminance);
    });
    console.log('Constructed');
  };

  /**
     * Callback for reading ambient light.
     * context of object that called callback.
     *
     * @param {Event} event object containing sensor data.
     */
  function onReadAmbientLight(event) {
    console.log(event);
    a.innerHTML = event;
  };
</script>
